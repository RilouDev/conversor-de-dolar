<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Conversor de moedas</title>
</head>
<body>
    <img class="topo-img" src="./img/dollar.gif.gif" alt="Imagem de dólar">

    <div class="container-conversor">
        <h1>Rilou Money Converter</h1>
        <input id="real" type="number" step="0.01" placeholder="Digite o valor em reais">
        <input id="dolar" type="number" step="0.01" placeholder="O valor em dólares é:">
        <p id="cotacao"></p>

        <button id="converter">Converter</button>
    </div>

    <div class="rodape-info">

        <h6> <a href= "https://www.instagram.com/rafaa.wrld/"> Projeto de Rafael</a>
        </h6>
    </div>

</body>
</html>
